<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator ocjena</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ff9900">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<style>
body { font-family:'Arial',sans-serif; margin:0; display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:20px; transition:0.3s; }
body.dark { background:#121212; color:white; }
body.light { background:#f9f9f9; color:black; }

h1 { margin-bottom:20px; }
.box { background:#1f1f1f; padding:25px; border-radius:20px; width:350px; display:flex; flex-direction:column; align-items:center; box-shadow:0 0 25px rgba(0,0,0,0.4); transition:0.3s; }
body.light .box { background:#fff; }

.ocjena-card { display:flex; justify-content:space-between; align-items:center; margin:8px 0; padding:10px 15px; width:100%; border-radius:12px; background:#121212; box-shadow:0 2px 6px rgba(0,0,0,0.3); transition:0.3s; }
body.light .ocjena-card { background:#f9f9f9; }

.ocjena-card input { width:60px; padding:8px; border-radius:6px; border:none; text-align:center; background:#121212; color:white; }
body.light .ocjena-card input { background:#fff; color:black; border:1px solid #ccc; }

.delete { background:red; color:white; border:none; padding:5px 10px; border-radius:6px; cursor:pointer; }
.btn-group { display:flex; gap:10px; flex-wrap:wrap; margin-top:15px; }
button { padding:10px 15px; border:none; border-radius:8px; cursor:pointer; background:#ff9900; color:white; font-weight:bold; }
#rezultat { margin-top:15px; font-size:1.3em; text-align:center; }
#poruka { margin-top:5px; text-align:center; }

#themeToggle { margin-bottom:15px; width:100%; padding:12px; border-radius:8px; border:none; background:#666; color:white; cursor:pointer; }
#themeToggle:hover { background:#888; }

footer { margin-top:auto; opacity:0.7; }
</style>
</head>
<body>
<h1>Kalkulator ocjena</h1>
<button id="themeToggle">Tamna/Svijetla tema</button>

<div class="box">
    <div id="ocjene"></div>
    <div class="btn-group">
        <button onclick="dodaj()">+ Dodaj</button>
        <button onclick="izracunaj()">Izračunaj</button>
        <button onclick="obrisiSve()">🗑 Obriši sve</button>
    </div>
    <h2 id="rezultat"></h2>
    <p id="poruka"></p>
</div>
<footer>Izradio Mario</footer>

<script>
const body = document.body;
const themeBtn = document.getElementById("themeToggle");
themeBtn.addEventListener("click", ()=>{
    body.classList.toggle("dark");
    body.classList.toggle("light");
    localStorage.setItem("theme", body.className);
});
if(localStorage.getItem("theme")) body.className = localStorage.getItem("theme");

function dodaj(v=""){
    const div=document.getElementById("ocjene");
    const wrap=document.createElement("div");
    wrap.className="ocjena-card";
    const input=document.createElement("input");
    input.type="number"; input.placeholder="1-5"; input.value=v;
    input.oninput=spremi;
    const btn=document.createElement("button"); btn.innerText="X"; btn.className="delete"; btn.onclick=()=>{wrap.remove();spremi();};
    wrap.appendChild(input); wrap.appendChild(btn); div.appendChild(wrap); spremi();
}

function izracunaj(){
    const inputs=document.querySelectorAll("#ocjene input");
    let suma=0,count=0;
    inputs.forEach(i=>{let v=Number(i.value); if(v>=1&&v<=5){suma+=v; count++;}});
    if(count===0){rezultat.innerText="Unesi ocjene!"; poruka.innerText=""; return;}
    let p=suma/count;
    rezultat.innerText="Prosjek: "+p.toFixed(2);
    poruka.innerText=p>=4.5?"🔥 Odličan!":p>=3.5?"👍 Vrlo dobar":p>=2.5?"🙂 Dobar":"😬 Moraš učiti";
}

function obrisiSve(){document.getElementById("ocjene").innerHTML=""; localStorage.removeItem("ocjene"); rezultat.innerText=""; poruka.innerText="";}
function spremi(){const arr=[];document.querySelectorAll("#ocjene input").forEach(i=>arr.push(i.value));localStorage.setItem("ocjene",JSON.stringify(arr));}
function ucitaj(){const data=JSON.parse(localStorage.getItem("ocjene"));if(data){data.forEach(v=>dodaj(v));}else dodaj();}
ucitaj();
</script>
</body>
</html>

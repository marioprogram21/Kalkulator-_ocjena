<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator ocjena</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family:Arial,sans-serif; margin:0; padding:20px; display:flex; flex-direction:column; align-items:center; background:#121212; color:white; }
h1 { text-align:center; }
.box { width:360px; background:#1f1f1f; padding:20px; border-radius:20px; box-shadow:0 0 20px rgba(0,0,0,0.5); }
.ocjena-card { display:flex; justify-content:space-between; align-items:center; padding:10px; margin:10px 0; border-radius:12px; background:#2c2c2c; }
.ocjena-card input { width:60px; padding:6px; border-radius:6px; border:1px solid #333; text-align:center; background:#121212; color:white; }
.delete { background:red; color:white; border:none; border-radius:6px; padding:5px 10px; cursor:pointer; }
button { padding:10px 15px; border:none; border-radius:8px; background:#ff9900; color:white; font-weight:bold; cursor:pointer; margin:5px 0; }
.btn-group { display:flex; justify-content:space-between; }
#rezultat { text-align:center; margin-top:10px; font-size:1.3em; }
</style>
</head>
<body>
<h1>Kalkulator ocjena</h1>
<div class="box">
  <div id="ocjene"></div>
  <div class="btn-group">
    <button onclick="dodaj()">+ Dodaj</button>
    <button onclick="izracunaj()">Izračunaj</button>
    <button onclick="obrisiSve()">Obriši sve</button>
  </div>
  <div id="rezultat"></div>
</div>

<script>
function dodaj(v=""){
  const div=document.getElementById("ocjene");
  const card=document.createElement("div");
  card.className="ocjena-card";
  const input=document.createElement("input");
  input.type="number"; input.placeholder="1-5"; input.value=v;
  const btn=document.createElement("button"); btn.innerText="X"; btn.className="delete"; btn.onclick=()=>card.remove();
  card.appendChild(input); card.appendChild(btn); div.appendChild(card);
}
function izracunaj(){
  const inputs=document.querySelectorAll("#ocjene input");
  let suma=0,count=0;
  inputs.forEach(i=>{let v=Number(i.value); if(v>=1&&v<=5){suma+=v; count++;}});
  if(count===0){document.getElementById("rezultat").innerText="Unesi ocjene!"; return;}
  document.getElementById("rezultat").innerText="Prosjek: "+(suma/count).toFixed(2);
}
function obrisiSve(){document.getElementById("ocjene").innerHTML=""; document.getElementById("rezultat").innerText="";}
dodaj();
</script>
</body>
</html>

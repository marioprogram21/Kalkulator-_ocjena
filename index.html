<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Moji kalkulatori</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ff9900">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">

<style>
body {
    margin:0;
    font-family:'Arial',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    flex-direction:column;
}
h1 { font-size:2em; margin-bottom:30px; text-align:center; }
.menu { display:flex; flex-direction:column; gap:20px; width:300px; }
.card {
    background: rgba(255,255,255,0.1);
    padding:20px;
    border-radius:20px;
    text-align:center;
    cursor:pointer;
    transition: transform 0.2s, background 0.2s;
    font-weight:bold;
    font-size:1.1em;
}
.card:hover {
    transform:scale(1.05);
    background: rgba(255,255,255,0.2);
}
footer { margin-top:30px; opacity:0.7; }
</style>
</head>
<body>

<h1>Odaberi kalkulator</h1>
<div class="menu">
    <div class="card" onclick="location.href='kalkulator.html#ocjene'">📝 Kalkulator ocjena</div>
    <div class="card" onclick="location.href='kalkulator.html#opci'">🎓 Kalkulator općeg uspjeha</div>
</div>

<footer>Izradio Mario</footer>

</body>
</html>

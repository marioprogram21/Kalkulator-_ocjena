<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator uspjeha</title>
<meta name="theme-color" content="#ff9900">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<style>
body {
    font-family:'Segoe UI',sans-serif;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#667eea,#764ba2);
}
.menu {
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius:25px;
    width:320px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
.menu h1 { margin-bottom:20px; font-size:1.8em; color:white; }
.menu button {
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    font-size:1em;
    font-weight:bold;
    background:#ff9900;
    color:white;
    cursor:pointer;
    transition:0.2s;
}
.menu button:hover { background:#ffb74d; }
#installBtn { display:none; }
</style>
</head>
<body>
<div class="menu">
    <h1>Kalkulator uspjeha</h1>
    <button onclick="location.href='kalkulator-ocjena.html'">Kalkulator ocjena</button>
    <button onclick="location.href='kalkulator-opceg.html'">Kalkulator općeg uspjeha</button>
    <button id="installBtn">📲 Instaliraj app</button>
</div>

<script>
// PWA Instalacija
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const btn = document.getElementById('installBtn');
    btn.style.display = 'block';
    btn.onclick = () => {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
        btn.style.display = 'none';
    };
});
</script>
</body>
</html>

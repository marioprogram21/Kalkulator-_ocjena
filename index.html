<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator ocjena & općeg uspjeha</title>
<meta name="theme-color" content="#ff9900">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    transition: all 0.3s;
}

/* TEME */
body.light { background: linear-gradient(135deg, #667eea, #764ba2); color:black; }
body.dark { background: #121212; color:white; }

.menu {
    padding: 30px;
    border-radius: 25px;
    width: 320px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    transition: all 0.3s;
}

/* Menu pozadine po temi */
body.light .menu { background: rgba(255,255,255,0.9); }
body.dark .menu { background: rgba(30,30,30,0.9); }

.menu h1 { margin-bottom:20px; font-size:1.8em; }
.menu button {
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    font-size:1em;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

/* Dugmad po temi */
body.light .menu button { background:#ff9900; color:white; }
body.dark .menu button { background:#ff9900; color:white; }

.menu button:hover { background:#ffb74d; }
footer { margin-top:15px; font-size:0.8em; opacity:0.8; text-align:center; }
body.light footer { color:black; }
body.dark footer { color:white; }
</style>
</head>
<body class="light">
<div class="menu">
    <h1>Kalkulator uspjeha</h1>
    <button onclick="location.href='kalkulator-ocjena.html'">Kalkulator ocjena</button>
    <button onclick="location.href='kalkulator-opceg.html'">Kalkulator općeg uspjeha</button>
    <button onclick="window.open('https://github.com/marioprogram21/Kalkulator-_ocjena/archive/refs/heads/main.zip','_blank')">Preuzmi App</button>
    <button id="toggleTheme">Tamna/Svijetla tema</button>
    <footer>Izradio Mario</footer>
</div>

<script>
// Toggle teme
const toggleBtn = document.getElementById("toggleTheme");
toggleBtn.addEventListener("click", () => {
    document.body.classList.toggle("light");
    document.body.classList.toggle("dark");
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator općeg uspjeha</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family:Arial,sans-serif; margin:0; padding:20px; display:flex; justify-content:center; background:#121212; color:white; }
.app { width:360px; background:#1f1f1f; padding:20px; border-radius:25px; box-shadow:0 0 20px rgba(0,0,0,0.5); }
h2 { text-align:center; }
.input-row { display:flex; gap:10px; padding:10px; margin:10px 0; border-radius:12px; background:#2c2c2c; align-items:center; }
.input-row select,input { flex:1; padding:8px; border-radius:6px; border:1px solid #333; background:#121212; color:white; }
button { padding:10px 15px; border:none; border-radius:8px; background:#ff9900; color:white; font-weight:bold; cursor:pointer; margin:5px 0; }
.cards { margin-top:15px; }
.card { display:flex; justify-content:space-between; padding:10px; border-radius:12px; background:#2c2c2c; margin-top:5px; }
</style>
</head>
<body>
<div class="app">
<h2>Kalkulator općeg uspjeha</h2>

<div class="input-row">
  <select id="subject">
    <option value="" disabled selected>Odaberi predmet</option>
    <option>Matematika</option>
    <option>Hrvatski jezik</option>
    <option>Engleski jezik</option>
  </select>
  <input type="number" id="grade" placeholder="1-5">
</div>

<div style="display:flex; justify-content:space-between;">
  <button onclick="add()">Dodaj ocjenu</button>
  <button onclick="removeAll()">Obriši sve</button>
</div>

<div class="cards" id="cards"></div>

</div>

<script>
let grades = [];
function add(){
  const subject = document.getElementById("subject").value;
  const grade = document.getElementById("grade").value;
  if(!subject || grade<1 || grade>5) return;
  grades.push({subject, grade});
  render(); document.getElementById("subject").selectedIndex=0; document.getElementById("grade").value="";
}
function removeAll(){ grades=[]; render();}
function render(){
  const container = document.getElementById("cards"); container.innerHTML="";
  grades.forEach((g)=>{
    const card = document.createElement("div"); card.className="card";
    card.innerHTML = `<span>${g.subject}</span><span>${g.grade}</span>`;
    container.appendChild(card);
  });
}
</script>
</body>
</html>

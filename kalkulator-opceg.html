<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Kalkulator općeg uspjeha</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family:'Segoe UI',sans-serif'; margin:0; padding:20px; display:flex; justify-content:center; background:#121212; color:white; transition:0.3s; }
body.light { background:#f9f9f9; color:black; }

.app { width:360px; padding:25px; border-radius:25px; background:rgba(31,31,31,0.95); box-shadow:0 0 25px rgba(0,0,0,0.4); transition:0.3s; }
body.light .app { background:#fff; }

h2 { text-align:center; margin-bottom:20px; }

.input-row { display:flex; gap:10px; padding:10px 12px; border-radius:12px; background:#2c2c2c; margin-bottom:10px; }
body.light .input-row { background:#f0f0f0; }

select,input { flex:1; padding:8px; border-radius:6px; border:none; background:#121212; color:white; }
body.light select,input { background:#fff; color:black; border:1px solid #ccc; }

button { padding:10px 15px; border:none; border-radius:8px; cursor:pointer; background:#ff9900; color:white; font-weight:bold; margin-top:5px; width:48%; }
button:hover { background:#ffb74d; }

.cards { margin-top:15px; }
.card { display:flex; justify-content:space-between; padding:10px 12px; border-radius:12px; background:#2c2c2c; margin-top:6px; }
body.light .card { background:#f0f0f0; color:black; }

.grade { text-align:right; width:20%; }
.delete { background:rgba(0,0,0,0.1); border:none; color:black; border-radius:8px; cursor:pointer; padding:2px 6px; font-weight:bold; font-size:0.8em; }
.delete:hover { background:rgba(0,0,0,0.2); }

.avg { text-align:center; margin-top:20px; }
.avg-number { font-size:48px; font-weight:bold; letter-spacing:1px; }
.small { opacity:0.8; font-size:0.9em; }

#themeToggle { margin-bottom:15px; width:100%; padding:12px; border-radius:8px; border:none; background:#666; color:white; cursor:pointer; }
#themeToggle:hover { background:#888; }

footer { margin-top:10px; text-align:center; opacity:0.7; }
</style>
</head>
<body class="dark">

<div class="app">
<h2>Kalkulator općeg uspjeha</h2>
<button id="themeToggle">Tamna/Svijetla tema</button>

<div class="input-row">
  <select id="subject">
    <option value="" disabled selected>Odaberi predmet</option>
    <option>Matematika</option>
    <option>Hrvatski jezik</option>
    <option>Engleski jezik</option>
    <option>Priroda</option>
    <option>Povijest</option>
    <option>Geografija</option>
    <option>Likovna kultura</option>
    <option>Glazbena kultura</option>
    <option>Tjelesna i zdravstvena kultura</option>
    <option>Tehnička kultura</option>
    <option>Informatika</option>
  </select>
  <input type="number" id="grade" placeholder="Ocjena (1-5)">
</div>

<div style="display:flex; justify-content:space-between;">
  <button onclick="add()">Dodaj ocjenu</button>
  <button onclick="removeAll()">Obriši sve</button>
</div>

<div class="cards" id="cards"></div>

<div class="avg">
  <div class="avg-number" id="avg">0.00</div>
  <div class="small">Prosjek</div>
</div>

<footer>Izradio Mario</footer>
</div>

<script>
// Tema
const themeBtn = document.getElementById("themeToggle");
themeBtn.addEventListener("click", () => {
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.className);
});
if(localStorage.getItem("theme")) document.body.className = localStorage.getItem("theme");

// Kalkulator logika
let grades = JSON.parse(localStorage.getItem("grades")) || [];
function save(){ localStorage.setItem("grades", JSON.stringify(grades)); }

function add(){
  const subject = document.getElementById("subject").value;
  const grade = parseInt(document.getElementById("grade").value);
  if(!subject || grade<1 || grade>5) return;
  grades.push({subject, grade});
  save(); render();
  document.getElementById("subject").selectedIndex = 0;
  document.getElementById("grade").value = "";
}

function remove(i){ grades.splice(i,1); save(); render(); }
function removeAll(){ grades=[]; save(); render(); }

function render(){
  const container = document.getElementById("cards"); container.innerHTML="";
  grades.forEach((g,i)=>{
    const card = document.createElement("div"); card.className="card";
    card.innerHTML = `<span>${g.subject}</span><span class="grade">${g.grade}</span>`;
    const btn = document.createElement("button"); btn.className="delete"; btn.textContent="x"; btn.onclick=()=>remove(i);
    card.appendChild(btn); container.appendChild(card);
  });
  calc();
}

function calc(){
  if(grades.length===0){ document.getElementById("avg").textContent="0.00"; return; }
  let sum=grades.reduce((a,b)=>a+b.grade,0);
  let avg=(sum/grades.length).toFixed(2);
  document.getElementById("avg").textContent=avg;
}

render();
</script>
</body>
</html>
